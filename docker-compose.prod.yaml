x-app-env: &app-env
  env_file:
    - ./.env.docker
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    NODE_ENV: production
    BACKEND_PORT: 4010
    PG_URL: postgresql://${PG_OCR_USER}:${PG_OCR_PASSWORD}@postgres:5432/${PG_OCR_DB}
    REDIS_OCR_HOST: redis
    REDIS_OCR_PORT: 6379
    AMQP_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
    MINIO_ENDPOINT: http://minio:9000
  networks:
    - ocr-network

services:
  postgres:
    image: postgres:18-alpine
    container_name: ocr-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_OCR_DB}
      POSTGRES_USER: ${PG_OCR_USER}
      POSTGRES_PASSWORD: ${PG_OCR_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PG_OCR_USER} -d ${PG_OCR_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${PG_OCR_HOST_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ocr-network

  redis:
    image: redis:8-alpine
    container_name: ocr-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_OCR_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_OCR_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${REDIS_OCR_HOST_PORT}:6379"
    networks:
      - ocr-network

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: ocr-rabbitmq-prod
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      - "127.0.0.1:${AMQP_HOST_PORT}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_HOST_PORT}:15672"
      - "127.0.0.1:${RABBITMQ_PROMETHEUS_HOST_PORT}:15692"
    networks:
      - ocr-network

  minio:
    image: minio/minio:latest
    container_name: ocr-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT}:9001"
    volumes:
      - minio-data:/data
    networks:
      - ocr-network

  db-migrate:
    <<: *app-env
    container_name: ocr-db-migrate-prod
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    command: ["pnpm", "--filter", "@ocr/db", "migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    <<: *app-env
    container_name: ocr-backend-prod
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT}:4010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully

  split-pdf-worker:
    <<: *app-env
    container_name: ocr-split-pdf-worker-prod
    build:
      context: .
      dockerfile: ./workers/Dockerfile
      args:
        WORKER_NAME: split-pdf-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      backend:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully

  transcribe-jpg-worker:
    <<: *app-env
    container_name: ocr-transcribe-jpg-worker-prod
    build:
      context: .
      dockerfile: ./workers/Dockerfile
      args:
        WORKER_NAME: transcribe-jpg-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      backend:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully

  post-process-page-worker:
    <<: *app-env
    container_name: ocr-post-process-page-worker-prod
    build:
      context: .
      dockerfile: ./workers/Dockerfile
      args:
        WORKER_NAME: post-process-page-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      backend:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully

  cleanup-process-worker:
    <<: *app-env
    container_name: ocr-cleanup-process-worker-prod
    build:
      context: .
      dockerfile: ./workers/Dockerfile
      args:
        WORKER_NAME: cleanup-process-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
    name: ocr-pgdata-prod
  minio-data:
    name: ocr-minio-data-prod

networks:
  ocr-network:
    name: ocr-network-prod
    driver: bridge
